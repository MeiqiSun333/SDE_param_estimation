# Model Configuration File
# 
# This file contains default parameters for the emotion network model.
# Modify these values to customize model behavior.

[simulation]
# Time step for numerical integration
dt = 0.5

# Total simulation time
end_time = 60

# Enable stochastic noise
stochastic = true

# Random seed for reproducibility (null for random)
random_seed = 42


[network_topology]
# Number of states in the network
num_states = 4

# State names
state_names = SAD, RUM, DIST, EMOCOPE


[default_parameters]
# Speed factors (rate of change)
speeds = 0.5, 0.5, 0.5, 0.5

# Noise levels (sigma)
sigmas = 0.1, 0.1, 0.1, 0.1

# Connection weights
# Format: state_index: [weights for inputs]
weights_0 = 1.0
weights_1 = 0.7
weights_2 = 0.6
weights_3 = -0.3, 0.8


[combination_functions]
# Combination function types
# Options: constant, alogistic, steponce, fluctuating_baseline
func_0 = constant
func_1 = alogistic
func_2 = alogistic
func_3 = alogistic

# Function parameters
# For constant: target value
# For alogistic: alpha (steepness), tau (threshold)
params_0 = 0.5
params_1 = 5, 0.3
params_2 = 5, 0.5
params_3 = 5, 0.4


[optimization]
# Optimization method: scipy, differential_evolution, jax
method = scipy

# Maximum iterations
max_iter = 100

# Population size (for differential evolution)
popsize = 15

# Learning rate (for gradient-based methods)
learning_rate = 0.01


[visualization]
# Figure size (width, height)
figsize = 12, 6

# Style: whitegrid, darkgrid, white, dark, ticks
style = whitegrid

# DPI for saved figures
dpi = 300

# Color palette
palette = viridis
